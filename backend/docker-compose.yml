services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    networks:
      - civitas_network

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - civitas_network

  postgres:
    image: postgres:17
    ports:
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - civitas_network
volumes:
  postgres_data:

networks:
  civitas_network:
    driver: bridge
