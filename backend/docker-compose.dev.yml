services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DOCKER_CONTAINER: 'true'
      DATABASE_URL: postgresql://civitas:civitas123@postgres:5432/civitas
    depends_on:
      - postgres
    volumes:
      - .:/usr/src/app
    networks:
      - civitas_network

  postgres:
    image: postgres:17
    ports:
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - civitas_network
volumes:
  postgres_data:

networks:
  civitas_network:
    driver: bridge
