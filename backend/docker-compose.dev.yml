services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3001:3001'
    volumes:
      - .:/usr/src/app
    networks:
      - civitas_network
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://civitas:civitas123@postgres:5432/civitas?schema=public

  postgres:
    image: postgres:17
    ports:
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - civitas_network
volumes:
  postgres_data:

networks:
  civitas_network:
    driver: bridge